<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vps剩余价值计算器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap"></noscript>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/crt.css', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/cards.css', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css', v=asset_version) }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loading.css', v=asset_version) }}">
</head>
<body class="bg-gradient-to-br from-[#0f0f1a] to-[#000000] text-white min-h-screen font-mono flex flex-col">
{% include 'loading_overlay.html' %}
{% include 'navbar.html' %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-center text-4xl font-bold text-cyan-300 mb-8">管理 VPS</h1>
    {% if vps_list %}
    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
        {% for vps in vps_list %}
        <div class="bg-[#111111] rounded-xl border border-cyan-400 p-6 relative shadow-lg hover:shadow-2xl hover:border-cyan-200 transition-transform transform hover:-translate-y-1" data-abs-url="{{ vps.abs_url }}">
            <h2 class="text-xl text-cyan-400 mb-2">{{ vps.name }}</h2>
            <p class="text-sm text-gray-300 mb-2">IP：{{ vps.ip_display }}</p>
            <div class="crt my-4 p-2 rounded overflow-x-auto" data-svg-url="{{ url_for('static', filename='images/' ~ vps.name ~ '.svg') }}"></div>
            <div class="flex flex-wrap gap-2 mt-4">
                <button type="button" class="copy-markdown text-sm px-3 py-1 bg-green-600 rounded hover:bg-green-500 text-white">📋 复制 Markdown</button>
                <a href="{{ url_for('edit_vps', vps_id=vps.id) }}" class="text-sm px-3 py-1 bg-blue-500 rounded hover:bg-blue-400 text-white">✏️ 编辑</a>
                <form method="post" action="{{ url_for('delete_vps', vps_id=vps.id) }}" onsubmit="return confirm('确定要删除这个 VPS 吗？');">
                    <button type="submit" class="text-sm px-3 py-1 bg-red-600 rounded hover:bg-red-500 text-white">🗑 删除</button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <p class="text-center">暂无 VPS 条目。</p>
    {% endif %}
</div>

<script>
  document.querySelectorAll('[data-svg-url]').forEach(el => {
    fetch(el.dataset.svgUrl)
      .then(resp => resp.text())
      .then(svg => el.innerHTML = svg);
  });

  document.querySelectorAll('.copy-markdown').forEach(btn => {
    btn.addEventListener('click', () => {
      const card = btn.closest('[data-abs-url]');
      const url = card.dataset.absUrl;
      const markdown = `![image](${url})`;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(markdown).then(() => {
          btn.textContent = '✅ 已复制';
          setTimeout(() => btn.textContent = '📋 复制 Markdown', 2000);
        }).catch(() => fallbackCopy(markdown, btn));
      } else {
        fallbackCopy(markdown, btn);
      }
    });
  });

  function fallbackCopy(text, btn) {
    const textarea = document.createElement('textarea');
    textarea.value = text;
    textarea.style.position = 'fixed';
    textarea.style.opacity = '0';
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();
    try {
      document.execCommand('copy');
      btn.textContent = '✅ 已复制';
      setTimeout(() => btn.textContent = '📋 复制 Markdown', 2000);
    } finally {
      document.body.removeChild(textarea);
    }
  }
</script>
{% include 'footer.html' %}
</body>
</html>
