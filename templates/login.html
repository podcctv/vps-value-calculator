<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>vps剩余价值计算器</title>
  <script src="https://cdn.tailwindcss.com"></script> <!-- 确保 Tailwind 正常加载 -->
  <style>
    body {
      background: #0f1115;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white">

  <div class="w-full max-w-sm px-4">
    <form method="post"
          class="bg-[#181b20] border border-[#2a3038] rounded-lg p-8 space-y-6">
      <div class="text-center">
        <h1 class="text-2xl font-bold text-white">用户登录</h1>
      </div>

      <div>

        <input id="username" name="username" placeholder="用户名" required
               class="w-full px-4 py-2 bg-[#101318] border border-[#2a3038] rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#2f6fed]" />
      </div>

      <div>

        <input id="password" type="password" name="password" placeholder="密码" required
               class="w-full px-4 py-2 bg-[#101318] border border-[#2a3038] rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-[#2f6fed]" />
      </div>

      <button type="submit"
              class="w-full py-2 bg-[#2f6fed] hover:bg-[#255cc7] text-white font-semibold rounded-lg transition duration-200">
        进入
      </button>
    </form>
  </div>

</body>
<script src="{{ url_for('static', filename='js/favicon.js') }}" defer></script>
</html>
